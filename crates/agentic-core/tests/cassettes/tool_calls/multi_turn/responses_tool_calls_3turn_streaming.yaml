      tools:
      - description: Query the pipeline orchestrator for a job's current state, metadata,
          and failure info.
        name: get_job_status
        parameters:
          additionalProperties: false
          properties:
            job_id:
              description: Pipeline job identifier, e.g. job-382
              type: string
          required:
          - job_id
          type: object
        strict: true
        type: function
      - description: Fetch error logs and stack traces for a failed pipeline job.
        name: get_error_logs
        parameters:
          additionalProperties: false
          properties:
            job_id:
              description: Pipeline job identifier
              type: string
            max_entries:
              description: Maximum log entries to return (default 50)
              type: integer
            severity:
              description: Minimum severity filter
              enum:
              - WARN
              - ERROR
              - FATAL
              - ALL
              type: string
          required:
          - job_id
          - severity
          - max_entries
          type: object
        strict: true
        type: function
      - description: Search internal operations runbooks for troubleshooting procedures.
        name: search_runbook
        parameters:
          additionalProperties: false
          properties:
            max_results:
              description: Maximum results to return (default 5)
              type: integer
            query:
              description: Natural language search query
              type: string
          required:
          - query
          - max_results
          type: object
        strict: true
        type: function
      - description: Execute a Python analysis script in a sandboxed environment for
          log parsing or data inspection.
        name: run_analysis
        parameters:
          additionalProperties: false
          properties:
            code:
              description: Python code to execute
              type: string
            timeout_seconds:
              description: Execution timeout (default 30)
              type: integer
          required:
          - code
          - timeout_seconds
          type: object
        strict: true
        type: function
      - description: Restart a failed pipeline job with optional configuration overrides.
        name: restart_job
        parameters:
          additionalProperties: false
          properties:
            job_id:
              description: Pipeline job identifier to restart
              type: string
            memory_override_gb:
              description: Override memory limit in GB
              type: integer
            priority:
              description: Queue priority
              enum:
              - low
              - normal
              - high
              type: string
            skip_completed_stages:
              description: Skip stages that completed successfully (default true)
              type: boolean
          required:
          - job_id
          - memory_override_gb
          - skip_completed_stages
          - priority
          type: object
        strict: true
        type: function
      - description: Search the public web for technical documentation, blog posts,
          and known issues.
        name: web_search
        parameters:
          additionalProperties: false
          properties:
            query:
              description: Search query
              type: string
          required:
          - query
          type: object
        strict: true
        type: function
