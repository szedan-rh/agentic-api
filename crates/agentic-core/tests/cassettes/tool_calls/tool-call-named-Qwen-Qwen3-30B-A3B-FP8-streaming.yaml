turns:
- filename: t1
  request:
    body:
      input: Translate Good morning, have a great day! into Spanish.
      model: Qwen/Qwen3-30B-A3B-FP8
      store: true
      stream: true
      tool_choice:
        name: translate_text
        type: function
      tools:
      - description: Get current temperature and conditions for a city
        name: get_weather
        parameters:
          additionalProperties: false
          properties:
            location:
              description: City name
              type: string
            unit:
              enum:
              - celsius
              - fahrenheit
              type: string
          required:
          - location
          type: object
        strict: true
        type: function
      - description: Get the current date and time in a given IANA timezone
        name: get_time
        parameters:
          additionalProperties: false
          properties:
            timezone:
              description: IANA timezone, e.g. Europe/Paris
              type: string
          required:
          - timezone
          type: object
        strict: true
        type: function
      - description: Get the latest stock price and daily change for a ticker symbol
        name: get_stock_price
        parameters:
          additionalProperties: false
          properties:
            currency:
              description: Currency to return the price in, e.g. USD
              type: string
            ticker:
              description: Stock ticker symbol, e.g. AAPL
              type: string
          required:
          - ticker
          type: object
        strict: true
        type: function
      - description: Search the web and return the top results for a query
        name: search_web
        parameters:
          additionalProperties: false
          properties:
            num_results:
              default: 3
              description: Number of results to return (1-10)
              type: integer
            query:
              description: Search query string
              type: string
          required:
          - query
          type: object
        strict: true
        type: function
      - description: Translate text from one language to another
        name: translate_text
        parameters:
          additionalProperties: false
          properties:
            source_language:
              description: Source language code; omit for auto-detect
              type: string
            target_language:
              description: Target language code, e.g. fr, de, ja
              type: string
            text:
              description: Text to translate
              type: string
          required:
          - text
          - target_language
          type: object
        strict: true
        type: function
      - description: Evaluate a mathematical expression and return the numeric result
        name: calculate
        parameters:
          additionalProperties: false
          properties:
            expression:
              description: Math expression to evaluate, e.g. (12 * 8) / 3 + sqrt(16)
              type: string
          required:
          - expression
          type: object
        strict: true
        type: function
      - description: Send an email to one or more recipients
        name: send_email
        parameters:
          additionalProperties: false
          properties:
            body:
              description: Plain-text email body
              type: string
            cc:
              description: CC recipients (optional)
              items:
                type: string
              type: array
            subject:
              description: Email subject line
              type: string
            to:
              description: Recipient email addresses
              items:
                type: string
              type: array
          required:
          - to
          - subject
          - body
          type: object
        strict: true
        type: function
      - description: Read the contents of a file at the given path
        name: read_file
        parameters:
          additionalProperties: false
          properties:
            encoding:
              description: File encoding
              enum:
              - utf-8
              - latin-1
              - ascii
              type: string
            path:
              description: Absolute or relative file path
              type: string
          required:
          - path
          type: object
        strict: true
        type: function
    headers:
      accept: '*/*'
      content-type: application/json
      user-agent: python-httpx/0.28.1
    method: POST
    path: /v1/responses
    query_params: {}
